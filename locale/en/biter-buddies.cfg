[item-description]
buddy-whistle=When in cursor:\n  [color=cyan]Left-click[/color] and drag to select buddies.\n  [color=cyan]Shift + Left-click[/color] and drag to add to selected buddies.\n  [color=cyan]Ctrl + Left-click[/color] a buddy to remove from selection.\n  [color=cyan]Right-click[/color] to send buddies.\n  [color=cyan]Shift + Right-click[/color] to queue move command.
