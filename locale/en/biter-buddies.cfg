[technology-description]
biter-buddies-1=Unlock small biter eggs. Throw them to hatch your first buddy! Use the Buddy Whistle button to command your squad.
biter-buddies-2=Unlock small spitter eggs. Ranged buddies that spit acid.
biter-buddies-3=Unlock medium biter and spitter eggs. Bigger, tougher buddies.
biter-buddies-4=Unlock big biter and spitter eggs. Serious battlefield companions.
biter-buddies-5=Unlock behemoth biter eggs. The biggest biters, forged on Vulcanus.
biter-buddies-6=Unlock behemoth spitter eggs. The biggest spitters, grown on Gleba.

